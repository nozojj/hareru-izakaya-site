<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>発幸酒場 晴（ハレル）</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-pattern"></div>

    <div class="hero-inner container">
      <div class="hero-copy">

        <h1>
          仕事帰りに、<br>
          ちょっと<span class="accent">一杯。</span>
        </h1>

        <div class="hero-divider">
          <span></span>
          <i>✿</i>
          <span></span>
        </div>

        <p class="hero-text">
          発酵を活かした、どこか懐かしい創作料理。<br>
          お袋の味を感じる、あたたかな空間です。
        </p>

        <a
          class="button hero-button"
          href="https://www.instagram.com/o.o.hareru.o.o/"
          target="_blank"
          rel="noopener noreferrer"
        >
          DMでお問い合わせ
          <span class="button-icon">◎</span>
        </a>
      </div>

      <div class="hero-visual">
        <img src="image.png" alt="店内写真" class="hero-main-photo" />
        <img src="logohareru.png" alt="発幸酒場 晴 ロゴ" class="hero-logo" />
      </div>
    </div>
  </header>

  <main class="main-content container">
    <section class="card intro-card">
      <div class="intro-text">
        <h2>お店の魅力</h2>

        <div class="section-divider">
          <span></span>
          <i>✿</i>
          <span></span>
        </div>

        <p>
          発酵を活かした、体にやさしい料理。<br>
          お袋の味を感じる一品。<br><br>
          自然と会話が生まれる距離感。<br>
          初めてでも気軽に立ち寄れる空間です。
        </p>
      </div>

      <div class="intro-image">
        <img src="counter.png" alt="店内カウンター写真" />
      </div>
    </section>

    <section class="card instagram-card" id="instagram">
      <h2>Instagram</h2>

      <div class="section-divider center">
        <span></span>
        <i>✿</i>
        <span></span>
      </div>

      <p class="instagram-lead">最新の料理や店内の様子はこちら</p>

      <div class="insta-gallery">
        <a class="insta-item" href="https://www.instagram.com/p/DUkCSkmCbnB/" target="_blank" rel="noopener noreferrer">
          <img src="insta1.png" alt="Instagram投稿1" />
          <span class="insta-icon">◎</span>
        </a>

        <a class="insta-item" href="https://www.instagram.com/p/DPnCtGzCT6F/" target="_blank" rel="noopener noreferrer">
          <img src="insta2.png" alt="Instagram投稿2" />
          <span class="insta-icon">◎</span>
        </a>

        <a class="insta-item" href="https://www.instagram.com/p/DOKj--diYdX/" target="_blank" rel="noopener noreferrer">
          <img src="insta3.png" alt="Instagram投稿3" />
          <span class="insta-icon">◎</span>
        </a>

        <a class="insta-item" href="https://www.instagram.com/p/DMymsXZzfkd/" target="_blank" rel="noopener noreferrer">
          <img src="insta4.png" alt="Instagram投稿4" />
          <span class="insta-icon">◎</span>
        </a>

        <a class="insta-item" href="https://www.instagram.com/p/DMeZ6A0JCmq/" target="_blank" rel="noopener noreferrer">
          <img src="insta5.png" alt="Instagram投稿5" />
          <span class="insta-icon">◎</span>
        </a>
      </div>

      <a
        class="button instagram-button"
        href="https://www.instagram.com/o.o.hareru.o.o/"
        target="_blank"
        rel="noopener noreferrer"
      >
        Instagramを見る
        <span class="button-arrow">→</span>
      </a>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-inner container">
      <p class="footer-title">
        発幸酒場 晴（ハレル）
        <span>◎</span>
      </p>
      <p class="footer-copy">© 2025 発幸酒場 晴（ハレル） All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
